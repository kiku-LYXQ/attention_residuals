seed: 42
model:
  mode: full_attnres_llama
  vocab_size: 32000
  max_len: 512
  num_layers: 16
  embed_dim: 512
  num_heads: 8
  mlp_dim: 2048
trainer:
  seq_len: 512
  batch_size: 4
  steps: 20000
  eval_every: 500
  eval_batches: 50
  device: cuda
  lr: 5e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  dataset:
  train_tokens_path: cache/qwen_wikitext103_train_tokens.pt
  val_tokens_path: cache/qwen_wikitext103_val_tokens.pt
  tokenizer_name: Qwen/Qwen2-0.5B
logging:
  wandb_project: attention_residuals
