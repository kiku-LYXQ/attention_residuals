seed: 42
model:
  mode: full_attnres_llama
  vocab_size: 32000
  num_layers: 16
  embed_dim: 512
  num_heads: 8
  mlp_dim: 2048
  max_len: 512
trainer:
  seq_len: 512
  batch_size: 4
  steps: 20000
  eval_every: 500
  eval_batches: 10
  device: cpu
  dataset_size: 1000
dataset:
  train_tokens_path: /tmp/attnres_train_tokens.pt
  val_tokens_path: /tmp/attnres_val_tokens.pt
  tokenizer_name: Qwen/Qwen2-0.5B
logging:
  wandb_project: attention_residuals
